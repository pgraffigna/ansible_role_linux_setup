---
- name: Importar llave
  ansible.builtin.apt_key:
    state: present
    url: "{{ vscodium_key }}"

- name: Agregar repos
  ansible.builtin.apt_repository:
    repo: deb "{{ vscodium_repo }}" vscodium main
    state: present
    update_cache: true

- name: Instalar vscodium
  ansible.builtin.apt:
    name: codium
    state: present